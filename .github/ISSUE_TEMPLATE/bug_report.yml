name: Bug report
description: Report a reproducible VoxKey problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include dictated private content, recordings, or credentials."
  - type: input
    id: version
    attributes:
      label: VoxKey version
      placeholder: "2.1.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and target app
      placeholder: "Windows 11 24H2; Notepad"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
