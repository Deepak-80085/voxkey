name: VoxKey CI and release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

jobs:
  test-build:
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt pyinstaller
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Package
        run: |
          pyinstaller --clean --noconfirm VoxKey.spec
          python tests/test_voxkey_packaging.py dist/VoxKey
      - name: Require signing certificate for tagged releases
        if: startsWith(github.ref, 'refs/tags/') && (env.WINDOWS_CERTIFICATE == '' || env.WINDOWS_CERTIFICATE_PASSWORD == '')
        run: throw "Tagged VoxKey releases require WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD."
      - name: Decode signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\voxkey.pfx",
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          )
      - name: Sign application
        if: env.WINDOWS_CERTIFICATE != ''
        run: |
          .\scripts\sign_windows.ps1 `
            -Files dist\VoxKey\VoxKey.exe `
            -CertificatePath "$env:RUNNER_TEMP\voxkey.pfx" `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
      - name: Build installer
        run: |
          iscc installer/VoxKey.iss
      - name: Sign installer
        if: env.WINDOWS_CERTIFICATE != ''
        run: |
          .\scripts\sign_windows.ps1 `
            -Files release\VoxKey-Setup-2.3.0.exe `
            -CertificatePath "$env:RUNNER_TEMP\voxkey.pfx" `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
      - name: Checksum
        run: |
          $hash = (Get-FileHash release/VoxKey-Setup-2.3.0.exe -Algorithm SHA256).Hash
          "$hash  VoxKey-Setup-2.3.0.exe" | Set-Content release/VoxKey-Setup-2.3.0.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: VoxKey-Windows
          path: |
            release/VoxKey-Setup-2.3.0.exe
            release/VoxKey-Setup-2.3.0.exe.sha256
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/VoxKey-Setup-2.3.0.exe
            release/VoxKey-Setup-2.3.0.exe.sha256
