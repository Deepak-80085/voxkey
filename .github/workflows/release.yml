name: VoxKey CI and release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

jobs:
  test-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt pyinstaller
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Package
        run: |
          pyinstaller --clean --noconfirm VoxKey.spec
          python tests/test_packaging.py dist/VoxKey
          iscc installer/VoxKey.iss
          $hash = (Get-FileHash release/VoxKey-Setup-2.1.0.exe -Algorithm SHA256).Hash
          "$hash  VoxKey-Setup-2.1.0.exe" | Set-Content release/VoxKey-Setup-2.1.0.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: VoxKey-Windows
          path: |
            release/VoxKey-Setup-2.1.0.exe
            release/VoxKey-Setup-2.1.0.exe.sha256
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/VoxKey-Setup-2.1.0.exe
            release/VoxKey-Setup-2.1.0.exe.sha256
