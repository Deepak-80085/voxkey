name: VoxKey CI and release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

jobs:
  test-build:
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt pyinstaller
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Package
        run: |
          pyinstaller --clean --noconfirm VoxKey.spec
          python tests/test_voxkey_packaging.py dist/VoxKey
      - name: Report release signing status
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE -ne '' -and $env:WINDOWS_CERTIFICATE_PASSWORD -ne '') {
            Write-Output 'Tagged release will be Authenticode-signed.'
          } else {
            Write-Warning 'Tagged release will be published unsigned because signing secrets are unavailable.'
          }
      - name: Decode signing certificate
        if: env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\voxkey.pfx",
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          )
      - name: Sign application
        if: env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        run: |
          .\scripts\sign_windows.ps1 `
            -Files dist\VoxKey\VoxKey.exe `
            -CertificatePath "$env:RUNNER_TEMP\voxkey.pfx" `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
      - name: Build installer
        run: |
          iscc installer/VoxKey.iss
      - name: Smoke-test installer
        run: |
          $installer = (Resolve-Path release\VoxKey-Setup-2.3.0.exe).Path
          $install = Start-Process $installer `
            -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' `
            -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Installer failed with exit code $($install.ExitCode)."
          }

          $installDir = Join-Path $env:LOCALAPPDATA 'Programs\VoxKey'
          $exe = Join-Path $installDir 'VoxKey.exe'
          if (-not (Test-Path $exe)) {
            throw "Installer did not create $exe."
          }
          if ((Get-Item $exe).VersionInfo.ProductVersion -ne '2.3.0') {
            throw "Installed VoxKey version is not 2.3.0."
          }

          $uninstaller = Join-Path $installDir 'unins000.exe'
          $uninstall = Start-Process $uninstaller `
            -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' `
            -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            throw "Uninstaller failed with exit code $($uninstall.ExitCode)."
          }
          if (Test-Path $exe) {
            throw "Uninstaller left the VoxKey executable installed."
          }
      - name: Sign installer
        if: env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        run: |
          .\scripts\sign_windows.ps1 `
            -Files release\VoxKey-Setup-2.3.0.exe `
            -CertificatePath "$env:RUNNER_TEMP\voxkey.pfx" `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD
      - name: Checksum
        run: |
          $hash = (Get-FileHash release/VoxKey-Setup-2.3.0.exe -Algorithm SHA256).Hash
          "$hash  VoxKey-Setup-2.3.0.exe" | Set-Content release/VoxKey-Setup-2.3.0.exe.sha256
      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $signed = $env:WINDOWS_CERTIFICATE -ne '' -and $env:WINDOWS_CERTIFICATE_PASSWORD -ne ''
          if ($signed) {
            @'
          ## Windows release

          VoxKey.exe and the installer were Authenticode-signed and timestamped.

          Verify the published SHA-256 checksum before installing.
          '@ | Set-Content release/release-notes.md -Encoding utf8
          } else {
            @'
          ## Unsigned Windows release

          This release was built from the public VoxKey source but is not Authenticode-signed. Windows Smart App Control, SmartScreen, or enterprise policy may warn about or block the executable.

          Verify the published SHA-256 checksum before installing. Do not disable Windows security protections solely to run this build.
          '@ | Set-Content release/release-notes.md -Encoding utf8
          }
      - uses: actions/upload-artifact@v4
        with:
          name: VoxKey-Windows
          path: |
            release/VoxKey-Setup-2.3.0.exe
            release/VoxKey-Setup-2.3.0.exe.sha256
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/release-notes.md
          files: |
            release/VoxKey-Setup-2.3.0.exe
            release/VoxKey-Setup-2.3.0.exe.sha256
